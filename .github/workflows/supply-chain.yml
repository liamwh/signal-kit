# Supply-chain gate for signal-kit.
#
# This workflow ALWAYS creates a check on pull requests (it is never path-
# filtered away), so it can be a required branch-protection check. Dependency-
# relevance is detected INSIDE the workflow: the core scan (cargo-deny +
# cargo-audit) runs on every event; the more expensive SBOM job runs only when
# dependency-relevant files changed (and on the default branch / schedule).
#
# The stable required check is the final `gate` job (if: always()), which
# evaluates every predecessor and fails unless: the scan succeeded and the SBOM
# job either succeeded or was intentionally skipped. Configure branch protection
# on:  "Supply chain / Gate (required)".
#
# Failure policy (SECURITY.md): any policy violation, vulnerability, or invalid
# SBOM fails the gate. Scanners capture exit codes and upload SARIF first; the
# gate fails explicitly afterwards — nothing is hidden behind continue-on-error.

name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Monday ~06:17 UTC (off the :00 mark). Catches advisories published
    # after the last relevant code change.
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write  # SARIF upload to code scanning (fork-guarded per step)

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_DENY_VERSION: 0.19.0
  CARGO_AUDIT_VERSION: 0.22.2
  CARGO_CYCLONEDX_VERSION: 0.5.9

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether dependency-relevant files changed. Always runs. For pull
  # requests it inspects the diff; on push/schedule/dispatch it assumes yes so
  # the full gate runs on the default branch and on demand.
  # ---------------------------------------------------------------------------
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deps: ${{ steps.detect.outputs.deps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect dependency-relevant changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          deps=true
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            if git diff --name-only "${base}..HEAD" \
                 | grep -qE '^(Cargo\.toml|Cargo\.lock|deny\.toml|crates/|scripts/|\.github/workflows/supply-chain\.yml)$'; then
              deps=true
            else
              deps=false
            fi
          fi
          echo "Dependency-relevant changes: $deps"
          echo "deps=$deps" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Core scan: cargo-deny (policy) + cargo-audit (RustSec) + helper self-tests.
  # Runs on every event — this is the cheap, always-on security gate.
  # ---------------------------------------------------------------------------
  scan:
    name: Scan (deny · audit · selftest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny + cargo-audit (pinned, verified binaries)
        uses: taiki-e/install-action@0eee80d37f55e834144deec670972c19e81a85b0 # v2.56.0
        with:
          tool: cargo-deny@${{ env.CARGO_DENY_VERSION }},cargo-audit@${{ env.CARGO_AUDIT_VERSION }},cargo-cyclonedx@${{ env.CARGO_CYCLONEDX_VERSION }}
      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-v1
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: cargo-deny (policy + SARIF)
        id: deny
        shell: bash
        run: |
          set -uo pipefail
          cargo deny check && code=0 || code=$?
          cargo deny --format sarif check > deny.sarif 2>/dev/null || true
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: cargo-audit (RustSec + SARIF)
        id: audit
        shell: bash
        run: |
          set -uo pipefail
          cargo audit && code=0 || code=$?
          cargo audit --format sarif > audit.sarif 2>/dev/null || true
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run supply-chain helper self-tests
        shell: bash
        run: bash scripts/selftest.sh

      # Fail the scan job on policy/vulnerability findings, AFTER the SARIF files
      # are generated above (so the upload steps below still surface the findings).
      # The deny/audit steps capture their exit code and exit 0 so SARIF upload +
      # self-test run first; this step is the single point that actually fails the
      # job, which the final gate then observes via needs.scan.result.
      - name: Fail scan on policy/vulnerability findings
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          [ "${{ steps.deny.outputs.code }}" = "0" ]  || { echo "::error::cargo-deny reported policy violations"; exit 1; }
          [ "${{ steps.audit.outputs.code }}" = "0" ] || { echo "::error::cargo-audit reported vulnerabilities"; exit 1; }

      - name: Upload cargo-deny SARIF to code scanning
        id: sarif_deny
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@181d5eefc20863364f96762470ba6f862bdef56b # v3.29.2
        # SARIF upload is a best-effort reporting channel, not part of the
        # security gate (which is cargo-deny/cargo-audit above). It must not
        # fail the job when code scanning is not enabled on the repo, on org
        # plans without it, or for any transient upload error — findings remain
        # in the logs, job summary, and the scanner fail-step above.
        continue-on-error: true
        with:
          sarif_file: deny.sarif
          category: cargo-deny
      - name: Upload cargo-audit SARIF to code scanning
        id: sarif_audit
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@181d5eefc20863364f96762470ba6f862bdef56b # v3.29.2
        continue-on-error: true
        with:
          sarif_file: audit.sarif
          category: cargo-audit
      # Surface SARIF-upload regressions prominently. The upload is
      # non-blocking (continue-on-error), but a failure must be visible — as a
      # workflow warning annotation AND a job-summary entry — so a disabled or
      # misconfigured code-scanning feature is never silently lost.
      - name: Report SARIF upload status
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          if [ "${{ steps.sarif_deny.outcome }}" = "failure" ] || [ "${{ steps.sarif_audit.outcome }}" = "failure" ]; then
            echo "::warning::SARIF upload to code scanning failed (is code scanning enabled? Settings → Code security). cargo-deny/cargo-audit findings are still enforced by the gate and visible in the workflow logs."
            {
              echo "## ⚠️ SARIF → code scanning upload failed"
              echo "The cargo-deny/cargo-audit SARIF upload did not succeed (code scanning may be disabled). This is **non-blocking**: vulnerability/policy findings are still enforced by cargo-deny + cargo-audit and the final \`Gate (required)\`, and are visible in the workflow logs. Enable code scanning (**Settings → Code security**) to surface them as code-scanning alerts."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SARIF → code scanning: uploaded (cargo-deny + cargo-audit categories)." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # SBOM job: generate + schema-validate. Runs only when dependency-relevant
  # files changed (or on main/schedule/dispatch). Skipped otherwise — but the
  # skip is intentional and accepted by the final gate.
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (generate · validate)
    needs: detect
    if: needs.detect.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-cyclonedx (pinned, verified binary)
        uses: taiki-e/install-action@0eee80d37f55e834144deec670972c19e81a85b0 # v2.56.0
        with:
          tool: cargo-cyclonedx@${{ env.CARGO_CYCLONEDX_VERSION }}
      - name: Generate canonical CycloneDX SBOM
        shell: bash
        run: bash scripts/sbom-generate.sh --config default
      - name: Fetch CycloneDX CLI validator (checksum-verified)
        id: cdxcli
        shell: bash
        run: echo "path=$(bash scripts/fetch-cyclonedx-cli.sh)" >> "$GITHUB_OUTPUT"
      - name: Validate CycloneDX SBOM
        shell: bash
        env:
          CYCLONEDX_CLI: ${{ steps.cdxcli.outputs.path }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          sboms=( target/sbom/signal-kit-*-default.cdx.json )
          bash scripts/sbom-validate.sh "${sboms[0]:?no default SBOM produced}"
      - name: Upload SBOM artefact (diagnostic, 7-day retention)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-supply-chain-${{ github.sha }}
          path: target/sbom/
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Final gate. This is the REQUIRED branch-protection check. It runs with
  # if: always() and evaluates every predecessor: detect + scan must succeed;
  # sbom must succeed or be intentionally skipped. Any other predecessor state
  # fails the gate.
  # ---------------------------------------------------------------------------
  gate:
    name: Gate (required)
    needs: [detect, scan, sbom]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout repository (for scripts/gate-eval.sh)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Evaluate gate
        shell: bash
        run: |
          bash scripts/gate-eval.sh \
            --detect "${{ needs.detect.result }}" \
            --scan   "${{ needs.scan.result }}" \
            --sbom   "${{ needs.sbom.result }}"
