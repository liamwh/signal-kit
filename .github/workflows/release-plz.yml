name: Release-plz

# release-plz versions signal-kit, opens the changelog/release PR, and (on merge
# to main) PUBLISHES to crates.io, creates the git tag + GitHub Release, then
# this workflow resolves the EXACT tag/version/SHA at the triggering commit
# (never "latest") and invokes the reusable release-supply-chain workflow to
# attach SBOMs, checksums and attestations.
#
# crates.io publishing uses the CARGO_REGISTRY_TOKEN secret (the hyprfocus
# pattern; works from the first release). The more secure tokenless option —
# crates.io Trusted Publishing (OIDC, RFC 3691) supported by release-plz —
# requires (a) the crate to be published once manually first (a crates.io
# limitation for new crates) and (b) a trusted-publisher configured on crates.io.
# To switch: remove CARGO_REGISTRY_TOKEN below and add `id-token: write` to this
# job's permissions once those prerequisites are done. See SECURITY.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.repository_owner == 'liamwh'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      # release-plz pushes the release tag via git, so credential persistence is
      # required here (the privileged boundary is the reusable workflow below,
      # which uses persist-credentials: false).
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run release-plz (publish to crates.io, create tag + Release)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Resolve the exact release identity at this commit. No "latest", no
      # creation-order: the tag is whichever tag points at $GITHUB_SHA. If
      # release-plz made no release this push, tag is empty and the supply-chain
      # job is skipped.
      - name: Resolve exact release identity
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag=""
          # release-plz creates the tag synchronously, but allow a short retry
          # for API propagation.
          # Use repos/.../tags (NOT git/matching-refs/tags): the latter returns
          # the tag-OBJECT sha for annotated tags, which never equals the commit
          # $GITHUB_SHA. repos/.../tags returns the dereferenced commit sha, so
          # it matches both lightweight and annotated tags.
          for _ in 1 2 3 4 5 6; do
            tag="$(gh api "repos/${{ github.repository }}/tags?per_page=100" \
                    --jq "[.[] | select(.commit.sha==\"$GITHUB_SHA\") | .name] | first" 2>/dev/null || true)"
            [ -n "$tag" ] && break
            sleep 5
          done

          if [ -z "$tag" ]; then
            echo "No release tag at $GITHUB_SHA — nothing to publish this run."
            {
              echo "tag="
              echo "version="
              echo "sha="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Exactly one tag must point at this commit (no ambiguity).
          count="$(gh api "repos/${{ github.repository }}/tags?per_page=100" \
                    --jq "[.[] | select(.commit.sha==\"$GITHUB_SHA\")] | length")"
          [ "$count" -eq 1 ] || { echo "::error::$count tags point at $GITHUB_SHA; refusing ambiguous release"; exit 1; }

          version="$(cargo metadata --no-deps --format-version 1 \
                      | jq -r '.packages[] | select(.name=="signal-kit") | .version')"
          # Expected tag is DERIVED from .release-plz.toml (tag_prefix + version),
          # not assumed. signal-kit is a single workspace member => "<prefix>v<version>".
          # shellcheck source=/dev/null
          . scripts/lib.sh
          expected="$(expected_release_tag "$version")"
          [ "$tag" = "$expected" ] || { echo "::error::tag '$tag' != expected '$expected' (derived from release-plz config)"; exit 1; }

          echo "Resolved release: tag=$tag version=$version sha=$GITHUB_SHA"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "sha=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

  # Invoke the reusable, privileged release-supply-chain workflow with the exact
  # identity resolved above. Runs only when release-plz fully SUCCEEDED and made
  # a release (tag non-empty) — so a crates.io publish failure (which fails the
  # release-plz job) does not attach partial supply-chain assets to a half-release.
  release-supply-chain:
    name: Release supply chain
    needs: release-plz
    if: needs.release-plz.result == 'success' && needs.release-plz.outputs.tag != ''
    uses: ./.github/workflows/release-supply-chain.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      tag: ${{ needs.release-plz.outputs.tag }}
      version: ${{ needs.release-plz.outputs.version }}
      sha: ${{ needs.release-plz.outputs.sha }}
